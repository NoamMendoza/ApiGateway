# ==========================================
# PERFIL: DESARROLLO (dev)
# Actívalo con: --spring.profiles.active=dev
# O en tu IDE configurando la VM option
# ==========================================

# Base de datos local (Docker Compose o instalación local)
spring.datasource.url=jdbc:postgresql://localhost:5432/gateway_dev
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# DDL: update aplica cambios automáticamente (OK en dev, NUNCA en prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis local
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ local
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# SSL desactivado en dev para poder usar HTTP simple con herramientas como Postman
server.ssl.enabled=false
server.port=8080

# Logging detallado en desarrollo
logging.level.com.apigatewaypagos=DEBUG
logging.level.org.springframework.security=DEBUG

# Spring Boot Actuator: endpoints expuestos en desarrollo
# En dev exponemos todo (*), lo que permite ver env, beans, mappings, etc.
management.endpoints.web.exposure.include=*
# Mostramos todos los detalles de salud (espacio en disco, status DB, Redis, RabbitMQ)
management.endpoint.health.show-details=always

# Stripe API Key (Modo Test)
stripe.api.key=${STRIPE_API_KEY:sk_test_51MockupKeyQueNoEsRealPeroStripeAceptaParaTestings123}
