# ==========================================
# PERFIL: PRODUCCIÓN (prod)
# Actívalo con: --spring.profiles.active=prod
# En Heroku/AWS/Railway: variable de entorno SPRING_PROFILES_ACTIVE=prod
# ==========================================

# Base de datos de producción — valores leídos desde variables de entorno del servidor
# NUNCA hardcodees credenciales reales aquí
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# DDL: validate solo verifica que el schema coincide con las entidades. Falla si no coincide.
# Las migraciones las gestiona Flyway, NO Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Redis de producción (ej: Redis Cloud, AWS ElastiCache)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# RabbitMQ de producción (ej: CloudAMQP)
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# API Key desde variable de entorno del servidor
app.security.api-key=${API_KEY}

# SSL activado con password desde variable de entorno
server.ssl.enabled=true
server.ssl.key-store=classpath:gateway-pagos.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-alias=gateway-pagos
server.port=8443

# Logging mínimo en producción — solo errores y warnings
logging.level.com.apigatewaypagos=INFO
logging.level.org.springframework=WARN

# Spring Boot Actuator: endpoints expuestos en PROD
# POR SEGURIDAD: Nunca expongas todo (*) en producción.
# Solo exponemos salud básica y métricas.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# En prod, puedes restringir a 'never' o 'when-authorized' para no filtrar información sensible en health
management.endpoint.health.show-details=when_authorized
