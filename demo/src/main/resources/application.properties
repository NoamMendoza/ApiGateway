spring.application.name=demo
# validate: Hibernate verifica que el esquema coincida con las entidades pero NO lo modifica.
# Las migraciones las gestiona Flyway a través de los scripts en db/migration/
spring.jpa.hibernate.ddl-auto=validate
app.security.api-key=sk_test-123456789
spring.docker.compose.enabled=false

# ==========================================
# HTTPS / TLS
# ==========================================
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:gateway-pagos.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=changeit
server.ssl.key-alias=gateway-pagos

# ==========================================
# RESILIENCE4J (CIRCUIT BREAKER & RETRY)
# ==========================================
resilience4j.circuitbreaker.instances.bankGateway.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.bankGateway.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bankGateway.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bankGateway.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.bankGateway.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.bankGateway.maxAttempts=3
resilience4j.retry.instances.bankGateway.waitDuration=2s
