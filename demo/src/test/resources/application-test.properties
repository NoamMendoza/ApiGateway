# Configuración para tests — desactiva SSL y Flyway para que los test contexts levanten ligeramente
# En tests no necesitamos Flyway: Testcontainers crea una BD nueva y temporal en cada ejecución
server.ssl.enabled=false
server.port=8080

# Hibernate crea el esquema al iniciar el contexto de test y lo destruye al terminarlo
# Esto es equivalente a lo que Flyway hace en producción, pero sin la complejidad de versionar
spring.jpa.hibernate.ddl-auto=create-drop

# Deshabilitar Flyway en tests — no tiene sentido correr migraciones sobre una BD temporal
spring.flyway.enabled=false

# Propiedades de Stripe para tests (placeholders)
stripe.api.key=sk_test_mock
stripe.webhook.secret=whsec_test_mock
